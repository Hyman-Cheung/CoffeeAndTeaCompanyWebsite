<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Main Page</title>
		<style type="text/css">
			*
			{
				margin: 0;
				padding: 0;
				font-family:sans-serif;
				font-weight:bold;
				box-sizing: border-box;
			}
			body
			{
				background-image:url(image/background_Img.jpg);
				background-attachment:fixed;
			}
			
			/********************* Anlimation **********************/
			@keyframes changeColor
			{
				0%, 100%
				{
					background-color:#EEEEEE;
				}
				50%
				{
					background-color:#868686;
				}
			}
			
			/************************ Header ***********************/
			header
			{	
				width:90%;
				height:65px;
				animation: changeColor 5s infinite;
				overflow:hidden;
			}
			#headline
			{
				position:relative;
				top:15px;
			}
			
			/********************* Live Clock *********************/
			#liveClock
			{			
				position:relative;
				width:255px;
				float:left;
				margin:-25px;
				margin-left:15px;
			}
			
			/*********************** Visits ***********************/
			#visitsSpan
			{
				position:relative;
				float:right;
				width:160px;
				height:35px;
				margin:-25px;
				margin-right:120px;
			}
			
			/************************* Box ************************/
			.box
			{
				background-color:#FFFFFF;
				font-weight:normal;
				font-family:cursive;
				font-size:20px;
				border: double 3px ;
				border-radius:30px;
				box-shadow: 3px 3px 3px 1px #262626,2px 2px 1px 1px #363636;
			}
			.box:hover
			{
				font-weight:bold;
				background-color:rgba(38,38,38,0.6);
				color:#FFFFFF;
			}
			
			/******************** Logout icon ********************/
			#logout_img
			{
				position:relative;
				float:right;
				margin:-25px;
				margin-right:30px;
				width:43px;
				height:43px;
			}
			#logout_img:hover
			{
				content:url(image/logout_2.png);
			}
			
			/********************* Top Menu *********************/
			#topMenu
			{
				width:90%;
				height:35px;	
				overflow:hidden;
				background-color:#363638;
				border-bottom:solid 6px #FFAA00;
			}

			#topMenu > ul > li
			{
				display:inline-table;
				width:300px;	
			}
				
			/******************** Sub-Menu *********************/
			.subMenu
			{	
				position:absolute;
				width:250px;
				background-color:rgba(86,86,88,0.8);#565658;
				border:solid 3px #FFFFFF;
				border-radius:30px;
				margin-left:26px;
				margin-top:1px;
				display:none;
				clear:both;
			}
			.subMenu > li 
			{
				margin:15px;
			}
			#topMenu > ul > li:hover > ul
			{
				display:block;
			}
			
			/******************* Main Content ******************/
			section 
			{
				width:90%;
				background-color:rgba(38,38,38,0.6);
			}
			section iframe[name="mainContent"]
			{
				width:100%;
			}
			
			/********************* Link ************************/
			a.link:link
			{
				color:#FFFFFF;
				font-size:25px;			
				text-decoration:none;
			}
			a.link:visited
			{
				color:#FFFFFF;
			}
			a.link:hover
			{
				color:#f5ee7d;
			}
			a.link:active
			{
				color:#fdc01d;
			}
			
			/********************** Other **********************/
			.withoutMarker
			{
				list-style:none;
			}
			.center
			{
				margin-left:auto;
				margin-right:auto;
				text-align:center;
			}
			
			/****************** Registration ******************/
			#register_background
			{
				position:absolute;
				top:0;
				left:0;
				height:100%;
				width:100%;
				background-color:rgba(38,38,38,0.6);
			}
			#register_popup
			{
				background-color:#FFFFFF;
				height:550px;
				width:650px;
				margin-left:auto;
				margin-right:auto;
				margin-top:130px;
				padding:30px;
				border:double 13px;
				border-radius:30px;
				font-size:20px;
			}
			.inputData
			{
				width:100%;
				padding:15px;
				font-size:20px;
				display:inline-block;
				margin:5px 0 22px 0;
			}
			#register_popup input[type="button"]
			{
				background-color: #FFBB00;
				width:100%;
				padding: 13px;
				font-size:23px;
				border:none;
				opacity:0.9;
			}
			#register_popup input[type="button"]:hover
			{
				opacity:1;
			}
			#register_popup hr
			{
				margin:13px 0 13px 0;
				boder: solid 1px #F1F1F1;
			}
		</style>
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
		<script type="text/javascript">
			// Resize the iframe:
			function resizeIframe(obj)
			{
				obj.style.height = screen.height*3/4 + 'px';
			}
			// Show the current date and time:
			function showLiveClock()
			{
				let now = new Date();
				let dateTime = now.toGMTString().substring(4,25);
				document.getElementById('liveClock').innerHTML = dateTime;
				setTimeout(showLiveClock,1000);
			}

			//************** Access the portfolio *************
			// Change the headline content: 
			function changeHeadline(text)
			{
				document.getElementById('headline').innerHTML = text;         
			}
			// Access the portfolio with entering password:
			var portf_accessed = false; 
			function accessPortfolio(obj)
			{
				let password = "JavaScript";
				// User don't need to enter password when visiting the portfolio:
				if(!portf_accessed)       
				{
					let inputPassword = prompt("Plase enter the password");
					if(inputPassword == "" || inputPassword == null)
					{
						// Do nothing
					}
					else if (inputPassword != password)
					{
						alert("Wrong password!!!");
					}
					else
					{
						// Show the portfolio:
						obj.href = "./Portfolio.html";
						obj.target = "mainContent";
						portf_accessed = true;
						// Change the headline content:
						changeHeadline(obj.textContent);
					}
				}
			}
			// Hide the portfolio: 
			function hidePortfolio(text)
			{
				let portfolio = document.getElementById('portfolio');
				portfolio.href = "#";
				portfolio.target = "_self";
 				portf_accessed = false;  
				// Change the headline content:				
				changeHeadline(text);	  				
			}

			//************** registration **************
			// Show the register form:
			function showForm()
			{
				document.getElementById('register_background').style.display = '';
				setTimeout(function(){
					alert("please do the registration before visting this website!");
				},300);
			}
			// Hidde the register form:
			function hideForm()
			{
				document.getElementById('register_background').style.display = 'None';
			}
			// Show welcome message:
			function welcome(name)
			{
				setTimeout(function(){
					alert("Welcome " + name);
				},300);
			}
			// Show advertisement:
			function showAvertisement()
			{
				window.open("advertisement.html","win2","width=1000,height=800");
			}
			// Store user information:
			function storeUserInfo(userInfo)
			{ 
				
				window.localStorage.setItem('user',JSON.stringify(userInfo));
			}
			// Create new user:
			function creatUser(uInfo)
			{
				let userInfo;
				// Store user information in the variables: 
				let uPassword_1 = uInfo.userPassword_1.value;
				let uPassword_2 = uInfo.userPassword_2.value;
				let uName = uInfo.userName.value;	
				// Check whether the user enter correct information:
				if(uName == "" || uPassword_1 == "" || uPassword_2 == "")
				{
					alert("Please fill in all information!!!");
				}
				else if(uPassword_1 != uPassword_2 )
				{
					alert("Tow password is not matched!!!");
				}
				else if(uPassword_1.length < 8 || uPassword_2.length < 8)
				{
					alert("Minimum password length is 8 characters!!!");
				}		
				else
				{
					// Clear the text boxes:
					uInfo.userPassword_1.value = "";
					uInfo.userPassword_2.value = "";
					uInfo.userName.value = "";
					userInfo =
					{
						name: uName,
						password: uPassword_1,
						visits: 1
					}	
					storeUserInfo(userInfo); // Store user information
					hideForm();				 // Hide the register form
					showVisits();            // Show user visits 
					welcome(userInfo.name); // Show welcome message
				}
			}
			// Show the visits:
			function showVisits()
			{
				let v = JSON.parse(window.localStorage.getItem('user')).visits;
				document.getElementById('visits').innerHTML = v;
			}
			// Check whether the user register and count user visits:
			function checkUserRecord()
			{
				let userInfo = JSON.parse(window.localStorage.getItem('user'));		// Get user information from local storage
				if(userInfo!=null)	
				{	
					hideForm();										 // Hide the register form
					userInfo.visits++;								 // Count user visits
					storeUserInfo(userInfo);						 // Update the user visits
					showVisits();                                    // show user visits 
					welcome("again, " + userInfo.name); // Show welcome message
					// Show the advertisement:
					showAvertisement();
				}
				else
				{
					showForm();				 // Show the register form
				}
			}
			// Logout:
			function logout()
			{
				document.getElementById('visits').innerHTML = "";		
				window.localStorage.clear(); // Clear the local storage	
				showForm(); // Show the register form
			}
			
			// Execute the following programs when this page is loaded:
			$(document).ready(function(){
				// Execute the checkUserRecord() function to check whether the user register and count user visits:
				checkUserRecord();
				// Execute the showLiveClock() function to show the current date and time:
				showLiveClock();
				// Show the sub-menu when the function over the target:
				$('#topMenu > ul > li').hover(function(){
					$(this).children('ul').slideDown();
				}, function(){
					$(this).children('ul').fadeOut();
				});
			});
		</script>
	</head>
	<body>
		<!--Header:-->
		<header class="center">
			<!--Headline-->
			<h1 id="headline">Coffee and Tea Company Limited</h1>
			<!--Live Clock:-->
			<span id="liveClock" class="box"></span>
			<!--Logout icon-->
			<img id="logout_img" src="image/logout_1.png" alt="logout" onclick="logout()">
			<!--visits:-->
			<span id="visitsSpan" class="box">
					Visits： <label id="visits"></label>
			</span>
		</header>
		<!--Top Menu:-->
		<nav id="topMenu" class="center withoutMarker">
			<ul class="withoutMarker">
				<li>
					<a id="portfolio" class="link" href="#" onclick="accessPortfolio(this)">Founder</a>
				</li>
				<li>
					<!--SubMenu:-->
					<a class="link" href="#">Products</a>
					<ul class="subMenu withoutMarker">
						<li><a id="coffee" class="link" href="./Coffee.html" target="mainContent" onclick="hidePortfolio(this.textContent)">Coffee</a></li>
						<li><a id="tea" class="link" href="./Tea.html" target="mainContent" onclick="hidePortfolio(this.textContent)">Tea</a></li>
					</ul>
				</li>
				<li>
					<a id="game" class="link" href="./Game.html" target="mainContent" onclick="hidePortfolio(this.textContent)">Games</a>
	
				</li>
			</ul>
		</nav>
		<!--Main Content:-->
		<section class="center">
			<iframe name="mainContent" src="./Coffee.html" frameborder=1 scrolling="yes" onload="resizeIframe(this)"></iframe>
		</section>
		
		<!--Registration-->
		<div id="register_background">
			<div id="register_popup">
				<h1>Register</h1>
				<hr>
				<form method="post" name="register_form">
					<label>Name</label>
					<input name="userName" class="inputData" type="text" placeholder="Enter Your Name"/>
					<label>Password</label>
					<input name="userPassword_1" class="inputData" type="password" placeholder="Enter Password"/>
					<label>Repeat Password</label>
					<input name="userPassword_2" class="inputData" type="password" placeholder="Repeat Password"/>
					<hr>
					<input type="button" value="register" onclick="creatUser(this.form)"/>
				</form>
			</div>
		<div>
	</body>
</html>

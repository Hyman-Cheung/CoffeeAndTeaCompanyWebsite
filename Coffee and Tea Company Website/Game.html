<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Memory Game</title>
		<style>
			* {
				padding: 0;
				margin: 0;
				box-sizing: border-box;
			}

			body 
			{
				flex-direction: column;
				display: flex;
				align-items: center;
				justify-content: center;
			}

			#gameSection 
			{
				width: 580px;
				height: 580px;
				display: flex;
				flex-wrap: wrap;
				perspective: 1000px;
				margin-left:auto;
				margin-right:auto;
			}
			
			/***************** Card *****************/
			.card 
			{
				position: relative;
				width: calc(22%);
				height: calc(22%);
				margin: 3px;
				margin-left:auto;
				margin-right:auto;
				transform: scale(1);
				transform-style: preserve-3d;
				transition: transform .6s;
				box-shadow: 3px 3px 3px 1px #262626;
			}

			.card:active 
			{
				transform: scale(0.98);
				transition: transform .1s;
			}

			.flip 
			{
				transform: rotateY(180deg);
			}

			.front_card, .back_card 
			{
				width: 100%;
				height: 100%;
				position: absolute;
				border-radius: 15px;
				background: rgba(38,38,38,0.8);
				backface-visibility: hidden;
			}

			.front_card 
			{
				transform: rotateY(180deg);
			}
			/**************** Top Meun  ****************/
			.topMeun
			{
				background-color:#262626;
				color:#FFFFFF;
				padding:10px;
				margin: 13px;
				border-radius:30px;
				box-shadow: 3px 3px 3px 1px #262626;
				text-align: center;
				font-family:cursive;
				font-weight:13px;
			}
			.topMeun:hover
			{
				box-shadow: 3px 3px 3px 1px #262626, 1px 1px 1px 1px #161616;
				background-color:#565656;
			}
			#gameLevel
			{
				width:80%;
			}
			.topMeun a 
			{
				margin: 10px;
				text-decoration: none;
				color:#FFFFFF;
			}
			.topMeun a:hover
			{
				color:#FFBB00;
			}
		</style>
	</head>
	<body>
		<!--Top Meun-->
		<div class="topMeun">
			Flips: <span id="flipCount">0</span>
		</div>
		<div class="topMeun" id="gameLevel" align="center">
			<a class="active" href="#" id="basic_level">Basic level</a>
			<a href="#" id="advanced_level">Advanced level</a>
		</div>
		<!-- Game Section-->
		<div id="gameSection" ></div>
		<script>
			// Define an array for storing card data:
			const cardsData = 
			[
				{ 
					name: "Aamericano1", 
					img: "./image/coffee/americano/americano_1.jpg" 
				},
				{ 
					name: "Cappuccino", 
					img: "./image/coffee/cappuccino/cappuccino_1.jpg" 
				},
				{ 
					name: "Cortado", 
					img: "./image/coffee/cortado/cortado_1.jpg" 
				},
				{ 
					name: "Espresso", 
					img: "./image/coffee/espresso/espresso_1.jpg" 
				},
				{ 
					name: "Macchiato", 
					img: "./image/coffee/macchiato/macchiato_1.jpg" 
				},
				{ 
					name: "BlackTea", 
					img: "./image/tea/blackTea/blackTea_1.jpg" 
				},
				{ 
					name: "GreenTea", 
					img: "./image/tea/greenTea/greenTea_1.jpg" 
				},
				{ 
					name: "Oolong tea1", 
					img: "./image/tea/oolongTea/oolongTea_1.jpg" 
				},
				{ 
					name: "Pu-erh tea", 
					img: "./image/tea/puErhTea/puErhTea_1.jpg" 
				},
				{ 
					name: "White Tea", 
					img: "./image/tea/whiteTea/whiteTea_1.jpg" 
				},
				{ 
					name: "Aamericano2", 
					img: "./image/coffee/americano/americano_2.jpg" 
				},
				{ 
					name: "Oolong tea2", 
					img: "./image/tea/oolongTea/oolongTea_2.jpg" 
				}
			];

			// Start the game when the link is clicked:
			document.getElementById('basic_level').addEventListener('click', () => startGame(4));
			document.getElementById('advanced_level').addEventListener('click', () => startGame(6));

			let flipCount = 0;
			let flipped = false;
			let lock = false;
			let firstCard, secondCard;
			let matchedCards = 0;
			
			// Start the game:
			function startGame(gameLevel) 
			{
				const gameSection = document.getElementById('gameSection'); 	
				gameSection.innerHTML = ''; 	// Clear all the previous cards
				flipCount = 0; 					// Reset the count of the flip
				matchedCards = 0; 				// Reset the matched cards
				document.getElementById('flipCount').textContent = flipCount;

				let cards = cardsData.slice(0, gameLevel === 4 ? 8 : 12); 	// Choose the cards according to the game level
				let pairs = [...cards, ...cards]; 							// Duplicate the element from the "cards" array 
				shuffle(pairs);												// Stor the array elements in random oder

				// Add cards to the game section based on the number of elements in the "pairs" array:
				pairs.forEach(data => {
					const card = document.createElement('div');            // Create the div elements
					card.classList.add('card');                            // Add the css style
					card.dataset.framework = data.name;                    // Assign the name field into the card div
					// Add the img elements into the card div:
					card.innerHTML = `<img class="front_card" src="${data.img}" alt="${data.name}" />
					 <img class="back_card" src="./image/coffee_icon.jpg" alt="back icon" />`;
					card.addEventListener('click', flipCard);			   // Flip and check the card when clicking the card
					gameSection.appendChild(card);                         // Add the div into a game section
				});
			}
			
			// Stor the array elements in random oder:
			function shuffle(array) 
			{
				array.sort(function()
				{
					return Math.random() - 0.5
				});
			}
			
			// Flip and check the card when clicking the card
			function flipCard() 
			{
				// It will do nothing when we click the cards during the fliping effectIf or click the first card:
				if (lock ||this === firstCard) 
				{
					return;
				}
				else
				{
					this.classList.add('flip'); 									// Add the css style into the card div to show the fliping effect
					flipCount++; 													// To count the number of fliping
					document.getElementById('flipCount').textContent = flipCount; 		// To show the number of fliping 
				}
				// Determine whether this is the first or second cards: 
				if (!flipped) 
				{
					flipped = true;
					firstCard = this;												// Assign the card object into the firstCard variable  								
					return;
				}
				else
				{
					secondCard = this;                                          	 // Assign the card object into the secondCard variable                                        
					checkCards();													 // Check whether the first and second cards is matched
				}
			}
			
			// Check whether the first and second cards is matched:
			function checkCards() 
			{
				if(firstCard.dataset.framework === secondCard.dataset.framework)
				{
					disableCards();
				}
				else
				{
					unflipCards();
				}
			}

			// To remove the event of the cards when the cards is already matched :
			function disableCards() 
			{
				// Remove the event from an first and second cards element: 
				firstCard.removeEventListener('click', flipCard);
				secondCard.removeEventListener('click', flipCard);
				matchedCards += 2; 	// Count the matched cards
				reset();			// Reset the first card and second card
				// Show the message when we win the game:
				if (matchedCards === document.querySelectorAll('.card').length) 
				{
					alert(`Congratulation, you total flips is ${Math.floor(flipCount / 2)}`);
				}
			}
			
			// The situation for the two cards are not matched:
			function unflipCards() 
			{
				// Unlock: 
				lock = true;
				// Remove the css style(fliping the card in the opposite direction):
				setTimeout(function() 
				{
					firstCard.classList.remove('flip'); 
					secondCard.classList.remove('flip');
					reset();
				}, 1000);
			}
		
			// Reset the first card and second card:
			function reset() 
			{
				flipped = false;
				lock = false;
				firstCard = null;
				secondCard = null;
			}
			
			
		</script>
	</body>
</html>

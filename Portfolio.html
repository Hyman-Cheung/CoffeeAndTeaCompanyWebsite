	<head>
		<title>Personal portfolio page</title>
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
		<script type="text/javascript">
			// Personal information:
			let personalInfo = 		// Creat a object of my personal information
			{
				name:"Cheung Hing Lam",
				sid:20241431,
				interest:{
					description:"Fashion is a dynamic and ever-evolving realm that intertwines creativity, culture, and personal expression. As a passionate enthusiast of fashion, I'm captivated by how it transcends mere clothing and becomes a powerful medium for storytelling and identity. From the latest runway trends to timeless classics, fashion reflects the zeitgeist of different eras while allowing individuals to showcase their unique styles. It serves as a canvas for innovation, where designers push boundaries and set new standards for beauty and functionality. Fashion is not just about what we wear; it's about how we present ourselves to the world and the statement we make through our choices. Whether it's the allure of haute couture or the charm of streetwear, fashion continuously inspires and shapes our perceptions, making it a fascinating topic to explore and celebrate.",
					link:"https://www.vogue.com/tag/misc/menswear"
				},
				email:"20241431@learner.hkuspace.hku.hk"
			}
			// Display information
			$(document).ready(function(){
				document.getElementById('myName').innerHTML = personalInfo.name;
				document.getElementById('mySID').innerHTML = personalInfo.sid;
				document.getElementById('myInterest').innerHTML = personalInfo.interest.description;
				document.getElementById('myEmail').href = "mailto:" + personalInfo.email;
				document.getElementById('interest_link').href = personalInfo.interest.link;
			});
			
			
			// Image player:
			let fashionImgs = ["fashion_1.jpg","fashion_2.jpg","fashion_3.jpg","fashion_4.jpg","fashion_5.jpg","fashion_6.jpg","fashion_7.jpg","fashion_8.jpg","fashion_9.jpg","fashion_10.jpg"];
			let imgObjet = new Image();
			let count = 0;
			// Next image
			function nextImg()
			{
				count++;
				if(count>fashionImgs.length-1)
				{
					count= 0;
				}
				imgObjet.src = "image/fashion/" + fashionImgs[count];
				document.getElementById('imgPlayer').src = imgObjet.src;
			}
			// Previous image
			function previousImg()
			{
				count--;
				if(count<0)
				{
					count= fashionImgs.length-1;
				} 
				imgObjet.src = "image/fashion/" + fashionImgs[count];
				document.getElementById('imgPlayer').src = imgObjet.src;	
			}
			// Play or stop the music:
			let isStart_music = false; 		// for user to stop or start the music
			function bMusic()
			{
				isStart_music=!isStart_music;
				if(isStart_music)
				{
					document.getElementById("music").play();
					document.getElementById("music_icon").src = "image/audio.png"; 
				}
				else
				{
					document.getElementById("music").pause();
					document.getElementById("music_icon").src = "image/noAudio.png";
				}
			}
		</script>
